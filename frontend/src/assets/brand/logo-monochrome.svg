<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 320" width="1024" height="320" role="img" aria-label="Arce Sabin Engineering (monochrome)">
  <title>Arce Sabin Engineering (monochrome)</title>
  <defs>
    <filter id="mono" color-interpolation-filters="sRGB">
      <feColorMatrix type="matrix" values="
        0.2126 0.7152 0.0722 0 0
        0.2126 0.7152 0.0722 0 0
        0.2126 0.7152 0.0722 0 0
        0      0      0      1 0" />
      <feComponentTransfer>
        <feFuncR type="gamma" amplitude="1" exponent="0.95" offset="0"/>
        <feFuncG type="gamma" amplitude="1" exponent="0.95" offset="0"/>
        <feFuncB type="gamma" amplitude="1" exponent="0.95" offset="0"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <image href="./logo-source.png" x="0" y="0" width="1024" height="320" preserveAspectRatio="xMidYMid meet" filter="url(#mono)" />
</svg>
