services:
  postgres:
    image: postgres:16-alpine
    container_name: ase_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ase
      POSTGRES_PASSWORD: ase
      POSTGRES_DB: ase
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ase_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ase -d ase"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: ase_pgadmin
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: change-me
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - ase_network

volumes:
  postgres_data:
  pgadmin_data:

networks:
  ase_network:
